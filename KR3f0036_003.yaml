body:
  text: 卷第三集曹今有粟七百五十斛問為糲米幾何答曰四百五十斛今有粟二百九十斛問為稗米幾何答曰一百五十六斛六斗今有粟五百六十斛問為𥽿米幾何答曰二百六十八斛八斗今有粟三百六十二斛問為御米幾何答曰一百五十二斛四升今有粟五百六十斛凡粟八斗易麥五斗問得麥幾何答曰三百五十斛今有豆八百四十九斛凡豆九斗易麻七斗問得麻幾何答曰六百六十斛三斗三升三合奇三今有錢二十七貫八百三十三文凡五文買梨三枚問幾何答曰一萬六千六百九十九枚奇四文今有米一千五百七十七斛斛別加八斗三升問計幾何答曰二千八百八十五斛九斗一升今有席一領坐客一十二人有席一千五百三十八領問客幾何答曰一萬八千四百五十六人又有席一領坐客二十三人有席一千五百領問客幾何答曰三萬四千五百人今有席一領坐客二十三人有客五十三萬三千六百八十人問席幾何答曰二萬三千二百三領奇十一人又有席一領坐客一十五人有四萬四千六百二十五人問席幾何答曰二千九百七十五領今有凡醬二升飼五人有醬三百二十斛問人幾何答曰八萬人今有凡錢五文買雉三隻有錢一萬七千五百二十五文問得雉幾何答曰一萬五百一十五隻
