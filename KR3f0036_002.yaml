body:
  text: 卷第二兵曹今有丁二萬三千六百九十二人責兵五千九百二十三人問幾何丁出一兵荅曰四丁出一兵今有丁八千九百五十八人凡三丁出一兵問出兵幾何荅曰二千九百八十六人今有兵九百七十人人給米七升問計幾何荅曰六十七斛九斗今有兵三千八三十七人人給錢五百五十六文問計幾何荅曰二千一百三十三貫三百七十二文今有兵三千一百四十八人人給布一丈二尺三寸問計幾何荅曰七百七十四端二丈四寸今有兵一千三百六十二人人給絹二丈八尺五寸問計幾何荅曰九百七十匹一丈七尺今有一萬人大將十人裨將二十人隊將一百人散兵九千八百七十人給絹有差大將人給三丈裨將人給一丈五尺散兵人給九尺問計幾何荅曰二千二百七十五匹奇三丈今有城周四十八里欲令禦賊每三步置一兵問用兵幾何荅曰四千八百人今有軍糧米三千二百四十六斛八斗七升每斛直錢四百八十二文問計幾何荅曰一千五百六十四貫九百九十一文三分四釐今有車二萬三千九百乘欲作方營每乘占地三步問計幾何荅曰七萬一千七百步今有馬六千二百四十三匹匹給粟五升三合問計幾何荅曰三百三十斛八斗七升九合今有牛六千五百頭頭給芻七束問計幾何荅曰四萬五千五百束
