body:
  text: 卷第五金曹今有五百六十五戶戶責絲一斤十一兩八銖問計幾何荅曰八石五斤三兩八銖今有五百六十五戶共責絲八百五斤三兩八銖問戶出絲幾何荅曰一斤十一兩八銖今有七百三十八戶共請絲二十七斤五兩問戶得幾何荅曰一十四銖二絫一黍奇一銖二黍今有絲一兩直錢五文有絲一百八十八斤一十兩問計直幾何荅曰一十五貫九十文今有絲九兩得絹一匹有絲三百二十四斤問計得幾何荅曰五百七十六匹今有生絲一斤為練絲一十二兩有練絲一千五百八十七兩問生絲幾何荅曰二千一百一十六兩今有貴絲一兩直錢五十六文賤絲一兩直錢四十二文有錢一百三十一貫八百一十文問各得幾何荅曰各二鈞二十四斤一兩今有錦一匹直錢八貫文問一丈一尺一寸各直幾何荅曰一丈二貫文一尺二百文一寸二十文今有金二斤令九十六人分之問人得幾何荅曰八銖今有錢二百三十八貫五百七十三文足欲為九十二陌問得幾何荅曰一百五十九貫三百一十八文奇足錢四分四釐
