body:
  text: 卷第一田曹今有方田廣從各五十六步問為田幾何荅曰一十三畝奇十六步今有方田廣從各六十八步問為田幾何荅曰一十九畝奇六十四步今有直田廣八十步從一百九十步問為田幾何荅曰六十三畝奇八十步今有圭田從三十步一頭廣二十四步一頭無步問為田幾何荅曰一畝奇一百二十步今有腰鼓田從八十二步兩頭各廣三十步中央廣十二步問為田幾何荅曰八畝奇四十八步今有鼓田兩頭各廣四十步中央廣五十二步從八十五步問為田幾何荅曰一十五畝奇一百四十步今有弧田弦八十步矢五步問為田幾何荅曰二百步今有蛇田頭廣三十三步胸廣五十七步尾廣十八步從九十步問為田幾何荅曰一十三畝奇一百九十二步今有牆田戶周一千步問為田幾何荅曰二頃六十畝奇一百步今有蕭田從四十八步一頭廣二十五步一頭廣三十五步問為田幾何荅曰六畝今有田桑生中央從隅至桑一百四十七步問為田幾何荅曰一頃八十三畝奇一百八十步今有邱田周六百四十步徑三百八十步問為田幾何荅曰二頃五十三畝奇八十步今有箕田一頭廣八十六步一頭廣四十步從九十步問為田幾何荅曰二十三畝奇一百五十步今有四不等田東三十五步西四十五步南二十五步北一十五步問為田幾何荅曰三畝奇八十步今有覆月田從三十步徑十步問為田幾何荅曰一百五十步今有田形如牛角從五十步口廣二十步問為田幾何荅曰二畝奇二十步今有圓田周七十八步徑二十六步問為田幾何荅曰二畝奇二十七步今有環田外周三十步內周一十二步徑三步問為田幾何荅曰六十三步今有田從一百步廣四十二步中有圓池周三十步徑一十步問池占外為田幾何荅曰一十七畝奇四十五步
