body:
  text: 五曹算經卷二兵曹既有田疇必資人功故以兵曹次之今有丁二萬三千六百九十二人責兵五千九百二十三人問㡬何丁出一兵答曰四丁出一兵術曰列二萬三千六百九十二人以五千九百二十三除之即得今有丁八千九百五十八人凡三丁出一兵問出兵㡬何答曰二千九百八十六人術曰列八千九百五十八人以三除之即得今有兵九百七十人人給米七升問計㡬何答曰六十七斛九斗術曰列兵九百七十人以七升乗之即得今有兵三千八百三十七人人給錢五百五十六文問計㡬何答曰二千一百三十三貫三百七十二文術曰列兵三千八百三十七人以五百五十六文乗之即得今有兵三千一百四十八人人給布一丈二尺三寸問計㡬何答曰七百七十四端二丈四寸術曰列兵三千一百四十八人以布一十二尺三寸乗之得三萬八千七百二十尺四寸以五十尺除之即得今有兵一千三百六十二人人給絹二丈八尺五寸問計㡬何答曰九百七十疋一丈七尺術曰列兵一千三百六十二人以絹二十八尺五寸乗之案原本訛作以絹二丈尺八寸乗之今改正得三萬八千八百一十七尺以四十尺除之即得今有一萬人大將十人裨將二十人隊將一百人散兵九千八百七十人給絹有差大將人給三丈裨將人給二丈隊將人給一丈五尺散兵人給九尺問計㡬何答曰二千二百七十五疋竒三文術曰列大將十人以三十尺乗之得三百尺又列裨將二十人以二十尺乗之得四百尺又列隊將一百人以一十五尺乗之得一千五百尺又列散兵九千八百七十人以九尺乗之得八萬八千八百三十尺并四位得九萬一千三十尺以疋法除之即得今有城周四十八里欲令禦賊每三步置一兵問用兵㡬何答曰四千八百人術曰列城周四十八里以三百步乗之得一萬四千四百步以三步除之即得今有軍糧米三千二百四十六斛八斗七升每斛直錢四百八十二文問計㡬何答曰一千五百六十四貫九百九十一文三分四氂術曰列米三千二百四十六斛八斗七升以四百八十二文乗之即得今有車二萬三千九百乗欲作方營每乗占地三步問計㡬何答曰七萬一千七百步術曰列車二萬三千九百乗以三步乗之即得今有馬六千二百四十三匹匹給粟五升三合問計㡬何答曰三百三十斛八斗七升九合術曰列馬六千二百四十三匹以五升三合乗之即得今有牛六千五百頭頭給芻七束問計㡬何答曰四萬五千五百束術曰列牛六千五百頭以七束乗之即得五曹算經卷二
