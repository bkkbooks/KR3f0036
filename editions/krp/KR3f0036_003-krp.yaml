body:
  text: 五曹算經卷三集曹既有人衆必用食飲故以集曹次之今有粟七百五十斛問為糲米㡬何答曰四百五十斛術曰列粟七百五十斛以三十乗之得二萬二千五百斛以五十除之即得今有粟二百九十斛問為粺米㡬何答曰一百五十六斛六斗術曰列粟二百九十斛以二十七乗之得七千八百三十斛以五十除之即得今有粟五百六十斛問為糳米㡬何答曰二百六十八斛八斗術曰列粟五百六十斛以二十四乗之得一萬三千四百四十斛以五十除之即得今有粟三百六十二斛問為御米㡬何答曰一百五十二斛四升術曰列粟三百六十二斛以二十一升乗之得七千六百二斛以五十除之即得今有粟五百六十斛凡粟八斗易麥五斗問得麥㡬何答曰三百五十斛術曰列粟五百六十斛以五十乗之得二萬八千斛以八千除之即得今有豆八百四十九斛凡豆九斗易麻七斗問得麻㡬何答曰六百六十斛三斗三升三合竒三升術曰列豆八百四十九斛以七十乗之得五萬九千四百三十斛以九十除之即得今有錢二十七貫八百三十三文凡五文買棃三枚問得棃㡬何答曰一萬六千六百九十九枚竒四文術曰列錢二十七貫八百三十三文以三乗之得八萬三千四百九十九以五除之即得今有米一千五百七十七斛斛别加八斗三升問訃㡬何答曰二千八百八十五斛九斗一升術曰列米一千五百七十七斛以加米一斛八斗三升乗之即得今有席一領坐客一十二人有席一千五百三十八領問客㡬何答曰一萬八千四百五十六人術曰列席一千五百三十八領以一十二人乗之即得又有席一領坐客二十三人有席一千五百領問客㡬何答曰三萬四千五百人術曰列席數一千五百領以二十三人乗之即得今有席一領坐客二十三人有客五十三萬三千六百八十人問席㡬何答曰二萬三千二百三領竒十一人術曰列五十三萬三千六百八十人以二十三人除之即得又有席一領坐客一十五人有客四萬四千六百二十五人問席㡬何答曰二千九百七十五領術曰列四萬四千六百二十五人以一十五人除之即得今有凡醬二升飼五人有醬三百二十斛問人㡬何答曰八萬人術曰列三百二十斛每上十之得三萬二千升以五人乗之得一十六萬升以二升除之即得今有凡錢五文買雉三隻有錢一萬七千五百二十五文問得雉㡬何答曰一萬五百一十五隻術曰列錢數一萬七千五百二十五文以雉三隻乗之得五萬二千五百七十五文以五文除之即得五曹算經卷三
