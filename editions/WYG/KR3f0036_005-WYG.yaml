body:
  text: 五曹算經卷五金曹倉廩貨幣交質變易故金曹次之今有五百六十五户户責絲一斤十一兩八銖問計絲㡬何答曰八石五斤三兩八銖術曰列一斤通作十六兩納十一兩得二十七兩以二十四銖乗之納八銖得六百五十六銖以乗户五百六十五得三十七萬六百四十銖以二十四銖除之得一萬五千四百四十三兩竒八銖又以十六兩除之得九百六十五斤竒三兩以三十斤除之得三十二鈞竒五斤又以四鈞除之即得今有五百六十五户共責絲八石五斤三兩八銖問户出絲㡬何答曰一斤十一兩八銖術曰列絲八石五斤三兩八銖以四乗八石得三十二鈞以三十斤乗之納五斤得九百六十五斤以十六兩乗之納三兩得一萬五千四百四十三兩以二十四銖乗之納八銖得三十七萬六百四十銖以五百六十五户除之得一户六百五十六銖以二十四銖除之得二十七兩竒八銖以十六除之即得今有七百三十八户共請絲二十七斤五兩問户得㡬何答曰一十四銖二絫一黍竒一銖二黍術曰列絲二十七斤以十六兩乗之納五兩得四百三十七兩又以二十四銖乗之得一萬四百八十八銖以七百三十八户除之即得今有絲一兩直錢五文有絲一百八十八斤一十兩問計直㡬何答曰一十五貫九十文術曰列絲一百八十八斤以一十六兩乗之納十兩得三千一十八兩以五文乗之即得今有絲九兩得絹一疋有絲三百二十四斤問計得㡬何答曰五百七十六疋術曰列三百二十四斤以十六兩乗之得五千一百八十四兩以九兩除之即得今有生絲一斤為練絲一十二兩有練絲一千五百八十七兩問生絲㡬何答曰二千一百一十六兩術曰列練絲一千五百八十七兩以十六兩乗之得二萬五千三百九十二兩以十二兩除之即得今有貴絲一兩直錢五十六文賤絲一兩直錢四十二文有錢一百三十一貫八百一十文問各得㡬何答曰各二鈞二十四斤一兩術曰列錢一百三十一貫八百一十文為實并絲貴賤價得九十八文為法以法除實得絲一千三百四十五兩以十六兩除之得八十四斤餘一兩次置之以三十斤除之即得今有錦一疋直錢八貫問一丈一尺一寸各直㡬何答曰一丈二貫文一尺二百文一寸二十文術曰列錢八貫以四十尺除之即尺價進位即丈價退位即寸價今有金二斤令九十六人分之問人得㡬何答曰八銖術曰列金二斤以十六兩乗之得三十二兩又以二十四銖乗之得七百六十八銖案原本脱得字今補以九十六人除之即得今有錢二百三十八貫五百七十三文足欲為九十二陌問得㡬何答曰二百五十九貫三百一十八文竒足錢四分四氂術曰列錢二百三十八貫五百七十三文足以九十二除之即得五曹算經卷五
