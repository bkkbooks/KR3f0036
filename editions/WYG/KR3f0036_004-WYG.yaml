body:
  text: 五曹算經卷四倉曹衆既㑹集必務儲蓄故倉曹次之今有二千七百户户責租米一十五斛問計㡬何答曰四萬五百斛術曰列二千七百户以一十五斛乗之即得今有官田九百畝凡一步收粟三升二合問計㡬何答曰六千九百一十二斛術曰列田九百畝以二百四十步乗之得二十一萬六千步以三升二合乗之即得今有粟七百斛欲雇車運之每一斛雇七升問車主粟主各㡬何答曰車主四十九斛粟主六百五十一斛術曰列粟七百斛以雇粟七升乗之得四十九斛為車粟以減本粟七百斛餘為主粟今有粟九百斛斛别加二斗五升問加㡬何答曰二百二十五斛術曰列九百斛以二斗五升乗之即得今有圓囷周三丈髙一丈六尺問受粟㡬何答曰七百四十斛竒一尺二寸術曰列周三丈自相乗得九百尺以髙一丈六尺乗之得一萬四千四百尺以十二除之得一千二百尺以斛法一尺六寸二分除之即得今有方窖從一丈三尺廣六尺深一丈問受粟㡬何答曰四百八十一斛四斗竒七寸八分術曰列從一丈三尺以廣六尺乗之得七十八尺以深一丈乗之得七百八十尺以斛法除之即得今有倉從一丈三尺廣六尺髙一丈中有從牽二枚方五寸從一丈三尺又横牽三枚方四寸從六尺又柱一枚周三尺髙一丈問受粟㡬何答曰四百七十一斛竒一百寸術曰列從一丈三尺上十之得一百三十寸以廣六十寸乗之得七千八百寸又列髙一丈上十之為一百寸以乗之得七十八萬寸為都積又列從牽二枚方五寸自相乗得二十五寸以從一百三十寸乗之得三千二百五十寸以從牽二枚乗之得六千五百寸又列横牽三枚方四寸自相乗得十六寸以從六十寸乗之得九百六十寸以横牽三枚乗之得二千八百八十寸又列柱一枚周三尺上十之得三十寸自相乗得九百寸以髙一百寸乗之得九萬寸以十二除之得七千五百寸并從横牽及柱等三位得一萬六千八百八十寸以減都積餘七十六萬三千一百二十寸為實以斛法一千六百二十寸除之即得又有倉從一丈九尺廣一丈五尺髙一丈三尺問受粟㡬何答曰二千二百八十七斛三升竒一分一氂四毫術曰列從一丈九尺以廣一十五尺乗之得二百八十五尺又以髙一十三尺乗之得三千七百五尺以斛法一尺六寸二分除之即得今有平地聚粟下周三丈髙四尺問粟㡬何答曰六十一斛七斗二升竒一分三氂六毫術曰列下周三十尺自相乗得九百尺以髙四尺乗之得三千六百尺以三十六除之得一百尺以斛法一尺六寸二分除之即得今有内角聚粟下周五十四尺髙五尺問粟㡬何答曰一千斛術曰列下周五十四尺自相乗得二千九百一十六尺以髙五尺乗之得一萬四千五百八十尺以九除之得一千六百二十尺以斛法一尺六寸二分除之即得今有半壁聚粟下周三十六尺髙四尺五寸問粟㡬何答曰二百斛術曰列下周三十六尺自相乗得一千二百九十六尺以髙四尺五寸乗之得五千八百三十二尺以十八除之得三百二十四尺以斛法一尺六寸二分除之即得今有外角聚粟下周四十八尺髙六尺問粟㡬何答曰三百一十六斛竒八分術曰列下周四十八尺自相乗得二千三百四尺以髙六尺乗之得一萬三千八百二十四尺以二十七除之得五百一十二尺以斛法一尺六寸二分除之即得五曹算經卷四
