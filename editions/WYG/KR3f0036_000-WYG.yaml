body:
  text: 五曹算經目録天文算法類二算書之屬卷一田曹卷二兵曹卷三集曹卷四倉曹卷五金曹臣等謹案隋書經籍志有九章六曹算經一卷而無五曹之目其六曹篇題亦不傳唐書藝文志始有甄鸞五曹算經五卷韓延五曹算經五卷李淳風注五曹孫子等算經二十卷魯續新集五時時要術三卷甄韓二家皆注是書者也其作者則不知為誰攷漢書梅福傳福上書言臣聞齊桓之時有以九九見者顔師古注云九九算術若今九章五曹之輩葢算學雖多不出乗除二者而乗除不出自一至九因而九之之數故舉九九為言而師古即以其時所有九章五曹等書實之非梅福時有是書也朱彞尊曝書亭集有五曹算經䟦云相傳其法出于孫武然彞尊第曰相傳無所引證葢不足據觀唐書選舉志稱孫子五曹共限一嵗既曰共限則五曹不出孫子明矣姑斷以甄鸞之注則其書確在北齊前耳自元明以來久無刻本藏書家傳寫訛舛殆不可通今散見永樂大典内者甄鸞韓延李淳風之注雖亦散佚而經文則逐條完善今參互攷校俾還舊觀遂為絶無僅有之善本攷夏侯陽算經引田曹倉曹者二引金曹者一而此書皆無其文然此書首尾分明脈絡通貫亦不似有所亡失疑隋志之九章六曹其目亦同陽所引田曹倉曹金曹等名乃彼書之文故不敢據以補入以溷其真焉乾隆四十七年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b8ed28b64fe0195e28f5368995eb4b0b3a11f9458078506c7e14fb1e4d356c98
