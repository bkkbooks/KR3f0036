body:
  text: 卷第四倉曹今有二千七百戶戶責租米一十五斛問計幾何答曰四萬五百斛今有官田九百畝凡一步收粟三升二合問計幾何答曰六千九百一十二斛今有粟七百斛欲雇車運之每一斛雇七升問車主粟主各幾何答曰車主四十九斛粟主六百五十一斛今有粟九百斛斛別加二斗五升問加幾何答曰二百二十五斛今有圓囷周三丈高一丈六尺問受粟幾何答曰七百四十斛奇一尺二寸今有方窖從一丈三尺廣六尺深一丈問受粟幾何答曰四百八十一斛四斗奇一寸三分今有倉從一丈三尺廣六尺高一丈中有從牽二枚方五寸從一丈三尺又橫牽三枚方四寸從六尺又柱一枚周三尺高一丈問受粟幾何答曰四百七十一斛奇一百寸又有倉從一丈九尺廣一丈五尺高一丈三尺問受粟幾何答曰二千二百八十七斛三升奇一分一釐四毫今有平地聚粟下周三丈高四尺問粟幾何答曰六十一斛七斗二升奇一分三釐六毫今有內角聚粟下周五十四尺高五尺問粟幾何答曰一千斛今有半壁聚粟下周三十六尺高四尺五寸問粟幾何答曰二百斛今有外角聚粟下周四十八尺高六尺問粟幾何答曰三百一十六斛奇八分
